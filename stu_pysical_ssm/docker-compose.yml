services:
  mysql:
    image: mysql:8.0
    container_name: stu_pysical_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cailiqan123
      MYSQL_DATABASE: student
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - stu_pysical_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build: ./backend
    container_name: stu_pysical_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JDBC_URL: jdbc:mysql://mysql:3306/student?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
      JDBC_PASSWORD: cailiqan123
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"

volumes:
  stu_pysical_mysql_data:
