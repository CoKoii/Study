        - generic [ref=e171]:
          - paragraph [ref=e172]: Agent Skills 是扩展 AI 功能的模块化能力。Antdv Next Skills 为 AI Agent 提供 Antdv Next 组件库的专业知识，让 AI 能够准确理解和使用组件。
          - heading "什么是 Agent Skills？ Permalink to \"什么是 Agent Skills？\"" [level=2] [ref=e173]:
            - text: 什么是 Agent Skills？
            - link "Permalink to \"什么是 Agent Skills？\"" [ref=e174] [cursor=pointer]:
              - /url: "#什么是-agent-skills"
              - text: "#"
          - paragraph [ref=e175]:
            - text: Agent Skills 是可重用的、基于文件系统的资源，为 AI Agent 提供特定领域的专业知识：工作流、上下文和最佳实践，将通用代理转变为专家。与提示不同（提示是对话级别的一次性任务指令），
            - strong [ref=e176]: Skills 按需加载，无需在多个对话中重复提供相同的指导
            - text: 。
          - heading "为什么使用 Antdv Next Skills？ Permalink to \"为什么使用 Antdv Next Skills？\"" [level=3] [ref=e177]:
            - text: 为什么使用 Antdv Next Skills？
            - link "Permalink to \"为什么使用 Antdv Next Skills？\"" [ref=e178] [cursor=pointer]:
              - /url: "#为什么使用-antdv-next-skills"
              - text: "#"
          - paragraph [ref=e179]:
            - strong [ref=e180]: 主要优势
            - text: ：
          - list [ref=e181]:
            - listitem [ref=e182]:
              - strong [ref=e183]: 专业化 AI
              - text: ：为 Antdv Next 组件开发定制功能，让 AI 成为组件库专家
            - listitem [ref=e184]:
              - strong [ref=e185]: 减少重复
              - text: ：创建一次，自动使用。无需每次都告诉 AI 如何使用组件
            - listitem [ref=e186]:
              - strong [ref=e187]: 组合功能
              - text: ：结合 Skills 构建复杂的组件开发工作流
            - listitem [ref=e188]:
              - strong [ref=e189]: 减少幻觉
              - text: ：通过提供真实的文档和示例，避免 AI 生成不存在的 Props 或错误的用法
            - listitem [ref=e190]:
              - strong [ref=e191]: 离线可用
              - text: ：Skills 将文档内容本地化，不依赖外部链接，确保稳定可靠
          - heading "Skills 如何工作 Permalink to \"Skills 如何工作\"" [level=2] [ref=e192]:
            - text: Skills 如何工作
            - link "Permalink to \"Skills 如何工作\"" [ref=e193] [cursor=pointer]:
              - /url: "#skills-如何工作"
              - text: "#"
          - paragraph [ref=e194]: Skills 利用 AI Agent 的虚拟机环境提供超越仅使用提示可能实现的功能。AI Agent 在具有文件系统访问权限的虚拟机中运行，允许 Skills 作为包含指令、可执行代码和参考资料的目录存在。
          - paragraph [ref=e195]:
            - text: 这种基于文件系统的架构支持
            - strong [ref=e196]: 渐进式披露
            - text: ：AI Agent 按需分阶段加载信息，而不是预先消耗上下文。
          - heading "三级加载机制 Permalink to \"三级加载机制\"" [level=3] [ref=e197]:
            - text: 三级加载机制
            - link "Permalink to \"三级加载机制\"" [ref=e198] [cursor=pointer]:
              - /url: "#三级加载机制"
              - text: "#"
          - paragraph [ref=e199]: Skills 可以包含三种类型的内容，每种在不同时间加载：
          - table [ref=e200]:
            - rowgroup [ref=e201]:
              - row "级别 加载时间 令牌成本 内容" [ref=e202]:
                - columnheader "级别" [ref=e203]
                - columnheader "加载时间" [ref=e204]
                - columnheader "令牌成本" [ref=e205]
                - columnheader "内容" [ref=e206]
            - rowgroup [ref=e207]:
              - row "第 1 级：元数据 始终（启动时） 约 100 个令牌 YAML 前置数据中的 name 和 description" [ref=e208]:
                - cell "第 1 级：元数据" [ref=e209]:
                  - strong [ref=e210]: 第 1 级：元数据
                - cell "始终（启动时）" [ref=e211]
                - cell "约 100 个令牌" [ref=e212]
                - cell "YAML 前置数据中的 name 和 description" [ref=e213]:
                  - text: YAML 前置数据中的
                  - code [ref=e214]: name
                  - text: 和
                  - code [ref=e215]: description
              - row "第 2 级：指令 触发 Skill 时 不到 5k 个令牌 包含指令和指导的 SKILL.md 主体" [ref=e216]:
                - cell "第 2 级：指令" [ref=e217]:
                  - strong [ref=e218]: 第 2 级：指令
                - cell "触发 Skill 时" [ref=e219]
                - cell "不到 5k 个令牌" [ref=e220]
                - cell "包含指令和指导的 SKILL.md 主体" [ref=e221]
              - row "第 3 级：资源 按需 实际上无限制 通过 bash 执行的捆绑文件，不将内容加载到上下文中" [ref=e222]:
                - cell "第 3 级：资源" [ref=e223]:
                  - strong [ref=e224]: 第 3 级：资源
                - cell "按需" [ref=e225]
                - cell "实际上无限制" [ref=e226]
                - cell "通过 bash 执行的捆绑文件，不将内容加载到上下文中" [ref=e227]
          - paragraph [ref=e228]:
            - strong [ref=e229]: 这意味着什么？
          - list [ref=e230]:
            - listitem [ref=e231]: AI Agent 启动时只知道「有一个 Antdv Next Skill 可以帮助处理组件」
            - listitem [ref=e232]: 当你请求「使用 Button 组件」时，AI 才加载 Button 的完整文档
            - listitem [ref=e233]: 如果文档引用了示例代码，AI 会按需读取这些文件
            - listitem [ref=e234]: 未使用的组件文档不会消耗任何上下文
          - blockquote [ref=e235]:
            - paragraph [ref=e236]:
              - text: 💡
              - strong [ref=e237]: 类比
              - text: ：就像为新团队成员准备的入职指南。他们知道指南的存在（元数据），需要时打开相关章节（指令），必要时查看详细附录（资源）。
