<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      abbr {
        font-style: italic;
        color: chocolate;
      }
    </style>
  </head>
  <body>
    <p>
      You can use <abbr>CSS</abbr> (Cascading Style Sheets) to style your
      <abbr>HTML</abbr> (HyperText Markup Language). Using style sheets, you can
      keep your <abbr>CSS</abbr> presentation layer and
      <abbr>HTML</abbr> content layer separate. This is called "separation of
      concerns."
    </p>
  </body>
</html>
