<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>HTML 语义化标签展示</title>
    <style>
      div li[class*="a"] {
        color: red;
      }
    </style>
  </head>
  <body>
    <div>
      <li>html</li>
      <li class="a">css</li>
      <li class="a b c">javascript</li>
      <li class="ab">typescript</li>
      <li>nodejs</li>
      <li>react</li>
      <li>vue</li>
      <li>angular</li>
      <li>webpack</li>
      <li>vite</li>
      <li>rollup</li>
      <li>parcel</li>
      <li>gulp</li>
    </div>
  </body>
</html>
